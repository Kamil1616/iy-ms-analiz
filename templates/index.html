<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Value Hunting Model</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #262626; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; }
        th { background: #333; color: #fbbf24; }
        tr:nth-child(even) { background: #2d2d2d; }
        .signal { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Value Hunting Model Çıktısı</h2>
    <table id="model-table">
        <thead>
            <tr>
                <th>Maç (Ev vs Dep)</th>
                <th>1</th>
                <th>X</th>
                <th>2</th>
                <th>Temel Dinamik (Model Çıktısı)</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script>
        async function loadData() {
            const response = await fetch('/api/fixtures');
            const data = await response.json();
            const body = document.getElementById('table-body');
            body.innerHTML = '';

            data.forEach(m => {
                const row = `<tr>
                    <td>**${m.match}**</td>
                    <td>**${m.odds['1']}**</td>
                    <td>**${m.odds['X']}**</td>
                    <td>**${m.odds['2']}**</td>
                    <td class="signal">${m.dynamic}</td>
                </tr>`;
                body.innerHTML += row;
            });
        }
        loadData();
    </script>
</body>
</html>
