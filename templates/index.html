<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Value Hunting Analiz</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .match-card { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #3b82f6; }
        .league { color: #94a3b8; font-size: 0.8rem; }
        .teams { font-weight: bold; font-size: 1.1rem; margin: 5px 0; }
        .signals { color: #10b981; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>⚽ Value Hunting Analiz</h1>
    <div id="match-container">Yükleniyor...</div>

    <script>
        async function fetchMatches() {
            try {
                // Backend'den veriyi zorla çekiyoruz
                const response = await fetch('/api/fixtures');
                const data = await response.json();
                
                const container = document.getElementById('match-container');
                container.innerHTML = '';

                if (data.length === 0) {
                    container.innerHTML = '⚠️ Maç bulunamadı (API bugün veri vermiyor).';
                    return;
                }

                data.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'match-card';
                    div.innerHTML = `
                        <div class="league">${match.league}</div>
                        <div class="teams">${match.homeTeam} vs ${match.awayTeam}</div>
                        <div class="signals">
                            Modül C (MS): ${match.analysis.module_c.signal} | 
                            İY 1.5 Üst: ${match.analysis.module_b.over_1_5_prob}%
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                document.getElementById('match-container').innerHTML = '❌ Hata: ' + error;
            }
        }
        fetchMatches();
    </script>
</body>
</html>
