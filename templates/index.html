<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IY/MS Analiz Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b0e;
  --surface:#111318;
  --surface2:#181b22;
  --surface3:#1e2230;
  --border:#242836;
  --border2:#2e3448;
  --text:#e8eaf0;
  --muted:#6b7280;
  --accent:#00e5a0;
  --accent2:#00c2ff;
  --warn:#ffa726;
  --red:#ff5252;
  --green:#00e5a0;
  --gold:#ffd700;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0d1117 0%,#161b2e 100%);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.header-logo{font-size:22px}
.header-title{font-size:16px;font-weight:800;color:var(--accent);letter-spacing:-0.3px}
.header-sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-left:auto}

/* CONTROLS */
.controls{padding:12px 16px;display:flex;flex-direction:column;gap:8px;background:var(--surface);border-bottom:1px solid var(--border)}
.date-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.date-btn{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;
  font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .2s;white-space:nowrap
}
.date-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.date-btn:hover:not(.active){border-color:var(--accent);color:var(--accent)}

.filter-row{display:flex;gap:8px}
.filter-input{
  flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'Barlow',sans-serif;
  outline:none;transition:border-color .2s
}
.filter-input:focus{border-color:var(--accent)}
.filter-input::placeholder{color:var(--muted)}
.filter-select{
  padding:8px 10px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;
  outline:none;cursor:pointer;min-width:120px
}
.filter-select:focus{border-color:var(--accent)}
.signal-toggle{
  padding:8px 12px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .2s
}
.signal-toggle.active{background:rgba(0,229,160,0.1);border-color:var(--accent);color:var(--accent)}

/* STATS BAR */
.stats-bar{
  padding:8px 16px;display:flex;gap:16px;background:var(--surface);
  border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)
}
.stat-item span{color:var(--text);font-weight:600}

/* FIXTURE LIST */
.fixtures-container{padding:12px 16px;display:flex;flex-direction:column;gap:8px}

/* FIXTURE CARD */
.fixture-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .2s;cursor:pointer
}
.fixture-card:hover{border-color:var(--border2)}
.fixture-card.has-signal{border-left:3px solid var(--accent)}
.fixture-card.open{border-color:var(--accent2)}

.fixture-header{padding:10px 12px;display:flex;align-items:center;gap:10px}

/* Team logos */
.teams-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.team-block{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.team-block.away{flex-direction:row-reverse;text-align:right}
.team-logo{
  width:28px;height:28px;border-radius:50%;object-fit:contain;
  background:var(--surface2);flex-shrink:0;
  border:1px solid var(--border2)
}
.team-logo-placeholder{
  width:28px;height:28px;border-radius:50%;background:var(--surface2);
  border:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:var(--muted)
}
.team-name{
  font-size:12px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}

.match-center{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.match-time{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
  color:var(--muted);white-space:nowrap
}
.match-time.live{color:var(--accent)}
.match-score{
  font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;
  color:var(--accent);letter-spacing:1px
}
.vs-text{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}

.card-footer{padding:4px 12px 8px;display:flex;align-items:center;justify-content:space-between}
.league-badge{
  font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);
  background:var(--surface2);padding:2px 7px;border-radius:10px;border:1px solid var(--border)
}
.signal-badges{display:flex;gap:4px;flex-wrap:wrap}
.signal-badge{
  font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:700;
  padding:2px 6px;border-radius:10px;
  background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.3)
}
.signal-badge.ms{background:rgba(0,194,255,0.1);color:var(--accent2);border-color:rgba(0,194,255,0.3)}

/* ANALYSIS PANEL */
.analysis-panel{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
  border-top:0px solid var(--border)
}
.analysis-panel.open{max-height:3000px;border-top-width:1px}
.analysis-body{padding:14px 12px;display:flex;flex-direction:column;gap:14px}

/* Lambda chips */
.lambda-row{display:flex;gap:6px;flex-wrap:wrap}
.lambda-chip{
  display:flex;flex-direction:column;align-items:center;
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:6px 10px;min-width:60px
}
.lambda-chip .lv{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--accent)}
.lambda-chip .ll{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.warn-box{
  background:rgba(255,167,38,0.1);border:1px solid rgba(255,167,38,0.3);
  border-radius:6px;padding:7px 10px;font-size:11px;color:var(--warn);
  font-family:'IBM Plex Mono',monospace
}

/* Module titles */
.mod-title{
  font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:700;
  color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;
  display:flex;align-items:center;gap:6px
}
.mod-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Module C - 1X2 */
.ms-grid{display:flex;gap:8px}
.ms-card{
  flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:10px 8px;text-align:center;transition:border-color .2s
}
.ms-card.has-signal{border-color:var(--accent2)}
.ms-outcome{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700}
.ms-prob{font-size:15px;font-weight:800;margin:3px 0}
.ms-odd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.ms-sig{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--accent);font-weight:700;margin-top:3px}

/* Module A - IY/MS */
.iyms-table{width:100%;border-collapse:collapse}
.iyms-table tr{border-bottom:1px solid var(--border)}
.iyms-table tr.top1{background:rgba(0,229,160,0.07)}
.iyms-table tr.top2{background:rgba(0,194,255,0.05)}
.iyms-table tr.divider-above td{border-top:1px dashed var(--border2)}
.iyms-table td{padding:5px 6px;font-size:12px}
.iyms-table .rank{font-family:'IBM Plex Mono',monospace;color:var(--muted);width:24px;font-size:11px}
.iyms-table .sel{font-family:'IBM Plex Mono',monospace;font-weight:700;width:40px}
.sel-1{color:var(--accent)}
.sel-2{color:var(--accent2)}
.sel-rest{color:var(--muted)}
.iyms-table .prob-bar-wrap{flex:1}
.bar-bg{background:var(--surface2);border-radius:3px;height:6px;width:100%;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--border2);transition:width .5s}
.bar-fill.b1{background:linear-gradient(90deg,var(--accent),#00b37a)}
.bar-fill.b2{background:linear-gradient(90deg,var(--accent2),#007ab3)}
.iyms-table .pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);width:40px;text-align:right}
.iyms-table .odd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);width:36px;text-align:right}

/* Module B - IY Over */
.iy-over-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.iy-over-card{
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px
}
.iy-over-card.signal{border-color:var(--accent);background:rgba(0,229,160,0.05)}
.iyo-market{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px}
.iyo-prob{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--text)}
.iyo-bar{height:4px;background:var(--border);border-radius:2px;margin:4px 0;overflow:hidden}
.iyo-bar-fill{height:100%;border-radius:2px;background:var(--border2)}
.iyo-bar-fill.on{background:var(--accent)}
.iyo-odd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.iyo-sig{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--accent);font-weight:700;margin-top:2px}

/* Scores grid */
.scores-grid{display:flex;gap:6px}
.score-card{
  flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:8px 6px;text-align:center
}
.sc-score{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--accent2)}
.sc-prob{font-size:11px;color:var(--muted);margin-top:2px}

/* Two-col grid for A+B */
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.ab-grid{grid-template-columns:1fr}}

/* Loading */
.loading{text-align:center;padding:40px 20px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
.spin{display:inline-block;animation:spin 1s linear infinite;margin-right:8px;font-size:18px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}
</style>
</head>
<body>

<div class="header">
  <span class="header-logo">⚽</span>
  <span class="header-title">IY/MS Analiz</span>
  <span class="header-sub" id="headerSub">Yukluyor...</span>
</div>

<div class="controls">
  <div class="date-row" id="dateRow"></div>
  <div class="filter-row">
    <input class="filter-input" id="filterTeam" placeholder="Takım ara..." oninput="renderFixtures()">
    <select class="filter-select" id="filterLeague" onchange="renderFixtures()">
      <option value="">Tüm Ligler</option>
    </select>
  </div>
  <div class="filter-row">
    <button class="signal-toggle" id="signalBtn" onclick="toggleSignal()">🔔 Sadece Sinyaller</button>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item">Maç: <span id="statTotal">0</span></div>
  <div class="stat-item">Sinyal: <span id="statSignal">0</span></div>
  <div class="stat-item" id="statQuota" style="display:none">Kota: <span id="statQuotaVal">-</span></div>
</div>

<div class="fixtures-container" id="fixtures">
  <div class="loading"><span class="spin">⟳</span> Maçlar yükleniyor...</div>
</div>

<script>
var allFixtures=[];
var analysisCache={};
var currentDate='';
var signalOnly=false;
var IYO_THRESHOLDS={'0.5':65,'1.5':54,'2.5':35,'3.5':22};

// ── DATE ROW ──────────────────────────────────────────
function buildDateRow(){
  fetch('/api/dates').then(function(r){return r.json();}).then(function(d){
    var row=document.getElementById('dateRow');
    row.innerHTML='';
    d.dates.forEach(function(dt){
      var btn=document.createElement('button');
      btn.className='date-btn'+(dt===currentDate?' active':'');
      var parts=dt.split('-');
      var label=parts[1]+'/'+parts[2];
      var day=new Date(dt).toLocaleDateString('tr-TR',{weekday:'short'});
      btn.textContent=day+' '+label;
      btn.onclick=function(){selectDate(dt);};
      row.appendChild(btn);
    });
    if(!currentDate&&d.dates.length) selectDate(d.dates[1]||d.dates[0]);
  }).catch(function(){
    var today=new Date().toISOString().slice(0,10);
    selectDate(today);
  });
}

function selectDate(dt){
  currentDate=dt;
  document.querySelectorAll('.date-btn').forEach(function(b){
    b.classList.toggle('active',b.textContent.includes(dt.slice(5).replace('-','/')));
  });
  loadFixtures(dt);
}

// ── LOAD FIXTURES ─────────────────────────────────────
function loadFixtures(dt){
  var container=document.getElementById('fixtures');
  container.innerHTML='<div class="loading"><span class="spin">⟳</span> Maçlar yükleniyor...</div>';
  document.getElementById('statsBar').style.display='none';
  fetch('/api/fixtures?date='+dt)
    .then(function(r){return r.json();})
    .then(function(d){
      allFixtures=d.fixtures||[];
      populateLeagueFilter(allFixtures);
      renderFixtures();
      updateStats();
      document.getElementById('statsBar').style.display='flex';
      document.getElementById('headerSub').textContent=dt;
    })
    .catch(function(e){
      container.innerHTML='<div class="empty"><div class="empty-icon">⚠</div><div class="empty-text">Yüklenemedi: '+e.message+'</div></div>';
    });
}

// ── RENDER ────────────────────────────────────────────
function renderFixtures(){
  var search=document.getElementById('filterTeam').value.toLowerCase();
  var league=document.getElementById('filterLeague').value;
  var filtered=allFixtures.filter(function(f){
    var nm=!search||
      (f.home_team_name||'').toLowerCase().includes(search)||
      (f.away_team_name||'').toLowerCase().includes(search);
    var lg=!league||f.league_name===league;
    if(!nm||!lg) return false;
    if(signalOnly){
      var a=analysisCache[f.fixture_id];
      var hasSig=(a&&((a.iy_signals&&a.iy_signals.length>0)||(a.ms_signals&&a.ms_signals.length>0)));
      if(!hasSig) return false;
    }
    return true;
  });
  var container=document.getElementById('fixtures');
  if(!filtered.length){
    container.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Maç bulunamadı</div></div>';
    return;
  }
  container.innerHTML='';
  filtered.forEach(function(f){
    var tmp=document.createElement('div');
    tmp.innerHTML=buildCard(f);
    var card=tmp.firstElementChild;
    card.querySelector('.fixture-header').addEventListener('click',function(){openAnalysis(f.fixture_id);});
    container.appendChild(card);
  });
  updateStats();
}

// ── BUILD CARD ────────────────────────────────────────
function buildCard(f){
  var a=analysisCache[f.fixture_id];
  var iySig=a?a.iy_signals||[]:[];
  var msSig=a?a.ms_signals||[]:[];
  var hasSig=iySig.length>0||msSig.length>0;
  var isLive=['1H','2H','HT','ET','BT','P','INT','LIVE'].indexOf(f.status||'')>=0;
  var hasScore=f.home_goals!==null&&f.home_goals!==undefined&&f.away_goals!==null&&f.away_goals!==undefined;
  var t='';
  if(f.date){
    var d=new Date(f.date);
    t=d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  }
  var timeStr=isLive&&f.elapsed?('● '+f.elapsed+"'"):t;
  var homeLogo='https://media.api-sports.io/football/teams/'+(f.home_team_id||0)+'.png';
  var awayLogo='https://media.api-sports.io/football/teams/'+(f.away_team_id||0)+'.png';
  var homeInit=(f.home_team_name||'?').slice(0,2).toUpperCase();
  var awayInit=(f.away_team_name||'?').slice(0,2).toUpperCase();

  var sigBadges='';
  iySig.forEach(function(s){sigBadges+='<span class="signal-badge">'+s.market+'</span>';});
  msSig.forEach(function(s){sigBadges+='<span class="signal-badge ms">MS:'+s.outcome+'</span>';});

  var scoreHtml=hasScore
    ?('<span class="match-score">'+f.home_goals+' - '+f.away_goals+'</span>')
    :'<span class="vs-text">VS</span>';

  return '<div class="fixture-card'+(hasSig?' has-signal':'')+(analysisCache[f.fixture_id]&&analysisCache[f.fixture_id]._open?' open':'')+'" id="card-'+f.fixture_id+'">'
    +'<div class="fixture-header">'
      +'<div class="teams-row">'
        +'<div class="team-block">'
          +'<img class="team-logo" src="'+homeLogo+'" alt="" onerror="this.outerHTML=\'<div class=team-logo-placeholder>'+homeInit+'</div>\'">'
          +'<span class="team-name">'+(f.home_team_name||'?')+'</span>'
        +'</div>'
        +'<div class="match-center">'
          +'<span class="match-time'+(isLive?' live':'')+'">'+timeStr+'</span>'
          +scoreHtml
        +'</div>'
        +'<div class="team-block away">'
          +'<img class="team-logo" src="'+awayLogo+'" alt="" onerror="this.outerHTML=\'<div class=team-logo-placeholder>'+awayInit+'</div>\'">'
          +'<span class="team-name">'+(f.away_team_name||'?')+'</span>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="card-footer">'
      +'<span class="league-badge">'+(f.league_name||'--')+'</span>'
      +'<div class="signal-badges">'+sigBadges+'</div>'
    +'</div>'
    +'<div class="analysis-panel" id="panel-'+f.fixture_id+'"></div>'
  +'</div>';
}

// ── OPEN ANALYSIS ─────────────────────────────────────
function openAnalysis(fid){
  var panel=document.getElementById('panel-'+fid);
  var card=document.getElementById('card-'+fid);
  if(!panel) return;
  if(panel.classList.contains('open')){
    panel.classList.remove('open');
    if(card) card.classList.remove('open');
    return;
  }
  if(analysisCache[fid]){
    var fix=allFixtures.find(function(f){return f.fixture_id===fid;});
    panel.innerHTML=buildAnalysisHtml(fix,analysisCache[fid]);
    panel.classList.add('open');
    if(card) card.classList.add('open');
  } else {
    loadAnalysis(fid);
  }
}

async function loadAnalysis(fid){
  var panel=document.getElementById('panel-'+fid);
  var card=document.getElementById('card-'+fid);
  if(!panel) return;
  panel.innerHTML='<div class="loading" style="padding:16px"><span class="spin">⟳</span> Analiz hesaplanıyor...</div>';
  panel.classList.add('open');
  if(card) card.classList.add('open');
  try{
    var r=await fetch('/api/analyze/'+fid+'?date='+currentDate);
    var d=await r.json();
    if(d.analysis){
      analysisCache[fid]=d.analysis;
      var fix=allFixtures.find(function(f){return f.fixture_id===fid;});
      panel.innerHTML=buildAnalysisHtml(fix||d.fixture,d.analysis);
      // Sinyal rozetlerini güncelle
      var f2=allFixtures.find(function(f){return f.fixture_id===fid;});
      if(f2){
        var oldCard=document.getElementById('card-'+fid);
        var tmp=document.createElement('div');
        tmp.innerHTML=buildCard(f2);
        var newCard=tmp.firstElementChild;
        newCard.querySelector('.fixture-header').addEventListener('click',function(){openAnalysis(fid);});
        newCard.querySelector('.analysis-panel').innerHTML=panel.innerHTML;
        newCard.querySelector('.analysis-panel').classList.add('open');
        newCard.classList.add('open');
        oldCard.replaceWith(newCard);
      }
      updateStats();
    } else {
      panel.innerHTML='<div class="loading" style="padding:16px;color:var(--red)">Hata: '+(d.error||'Bilinmeyen')+'</div>';
    }
  } catch(e){
    panel.innerHTML='<div class="loading" style="padding:16px;color:var(--red)">Bağlantı hatası</div>';
  }
}

// ── BUILD ANALYSIS HTML ───────────────────────────────
function buildAnalysisHtml(fix,a){
  var lh=a.lambda_home||0, la=a.lambda_away||0, lt=a.lambda_total||0, li=a.lambda_iy||0;

  // Lambda chips
  var chips='<div class="lambda-row">'
    +'<div class="lambda-chip"><span class="lv">'+lh+'</span><span class="ll">\u03BB Ev</span></div>'
    +'<div class="lambda-chip"><span class="lv">'+la+'</span><span class="ll">\u03BB Dep</span></div>'
    +'<div class="lambda-chip"><span class="lv">'+lt+'</span><span class="ll">\u03BB Top</span></div>'
    +'<div class="lambda-chip"><span class="lv">'+li+'</span><span class="ll">\u03BB IY</span></div>'
    +'</div>';

  var warn=a.data_warning?'<div class="warn-box">\u26a0 Takım verisi alınamadı, ortalama kullanıldı</div>':'';

  // MODULE C - 1X2
  var msR=a.ms_results||[];
  var msSig=a.ms_signals||[];
  var msHtml='<div class="ms-grid">';
  msR.forEach(function(r){
    var hasSig=msSig.some(function(s){return s.outcome===r.outcome;});
    var col=r.probability>45?'var(--accent)':r.probability>30?'var(--accent2)':'var(--muted)';
    msHtml+='<div class="ms-card'+(hasSig?' has-signal':'')+'">'
      +'<div class="ms-outcome" style="color:'+col+'">'+r.outcome+'</div>'
      +'<div class="ms-prob" style="color:'+col+'">%'+r.probability+'</div>'
      +'<div class="ms-odd">'+r.model_odd+'</div>'
      +(hasSig?'<div class="ms-sig">SINYAL ✓</div>':'')
      +'</div>';
  });
  msHtml+='</div>';

  // MODULE A - IY/MS
  var iymsR=a.iyms_results||[];
  var iymsHtml='<table class="iyms-table">';
  iymsR.forEach(function(r){
    var cls='';
    if(r.rank===1) cls='top1';
    else if(r.rank===2) cls='top2';
    if(r.divider) cls+=' divider-above';
    var selCls=r.rank===1?'sel-1':r.rank===2?'sel-2':'sel-rest';
    var barCls=r.rank===1?'b1':r.rank===2?'b2':'';
    var pct=Math.min(100,r.probability);
    iymsHtml+='<tr class="'+cls+'">'
      +'<td class="rank">'+r.rank+'</td>'
      +'<td class="sel '+selCls+'">'+r.selection+'</td>'
      +'<td style="width:100%;padding:5px 6px">'
        +'<div class="bar-bg"><div class="bar-fill '+barCls+'" style="width:'+pct+'%"></div></div>'
      +'</td>'
      +'<td class="pct">%'+r.probability+'</td>'
      +'<td class="odd">'+r.model_odd+'</td>'
      +'</tr>';
  });
  iymsHtml+='</table>';

  // MODULE B - IY Alt/Üst
  var iyoP=a.iy_over_probs||{};
  var iyoHtml='<div class="iy-over-grid">';
  ['0.5','1.5','2.5','3.5'].forEach(function(m){
    var pct=iyoP[m]||0;
    var thr=IYO_THRESHOLDS[m]||50;
    var isSig=pct>=thr;
    var odd=pct>0?((100/pct)*0.90).toFixed(2):'-';
    iyoHtml+='<div class="iy-over-card'+(isSig?' signal':'')+'">'
      +'<div class="iyo-market">IY '+m+' Üst</div>'
      +'<div class="iyo-prob">%'+pct+'</div>'
      +'<div class="iyo-bar"><div class="iyo-bar-fill'+(isSig?' on':'')+'" style="width:'+Math.min(100,pct)+'%"></div></div>'
      +'<div class="iyo-odd">'+odd+'</div>'
      +(isSig?'<div class="iyo-sig">SINYAL ✓</div>':'')
      +'</div>';
  });
  iyoHtml+='</div>';

  // MOST LIKELY SCORES - top 3
  var scoresHtml='';
  if(a.score_probs){
    var scores=Object.entries(a.score_probs).sort(function(x,y){return y[1]-x[1];}).slice(0,3);
    scoresHtml='<div>'
      +'<div class="mod-title">En Olası Skorlar</div>'
      +'<div class="scores-grid">';
    scores.forEach(function(s){
      scoresHtml+='<div class="score-card">'
        +'<div class="sc-score">'+s[0]+'</div>'
        +'<div class="sc-prob">%'+s[1]+'</div>'
        +'</div>';
    });
    scoresHtml+='</div></div>';
  }

  return '<div class="analysis-body">'
    +warn
    +chips
    +'<div><div class="mod-title">Modül C — Maç Sonucu</div>'+msHtml+'</div>'
    +'<div class="ab-grid">'
      +'<div><div class="mod-title">Modül A — IY/MS</div>'+iymsHtml+'</div>'
      +'<div><div class="mod-title">Modül B — IY Alt/Üst</div>'+iyoHtml+'</div>'
    +'</div>'
    +(scoresHtml||'')
    +'</div>';
}

  renderFixtures();
}

// ── STATS ─────────────────────────────────────────────
function updateStats(){
  var sigs=0;
  allFixtures.forEach(function(f){
    var a=analysisCache[f.fixture_id];
    if(a&&((a.iy_signals&&a.iy_signals.length>0)||(a.ms_signals&&a.ms_signals.length>0))) sigs++;
  });
  document.getElementById('statTotal').textContent=allFixtures.length;
  document.getElementById('statSignal').textContent=sigs;
}
